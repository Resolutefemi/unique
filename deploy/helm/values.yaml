# Unique.js — Helm Chart values
# Deploy Unique.js to Kubernetes.

apiVersion: v2
name: unique
description: Unique.js web framework — polyglot, fast, secure by default
type: application
version: 1.0.0
appVersion: "1.0.0"

replicaCount: 3

image:
  repository: uniquejs/unique
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  RUST_LOG: info
