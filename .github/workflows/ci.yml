name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-dev
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --lib --verbose

  test-features:
    name: Test (io_uring + simd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build with features
        run: cargo build -p kungfu-core --features "io_uring simd" --verbose
      - name: Test with features
        run: cargo test -p kungfu-core --lib --features "io_uring simd" --verbose

  bench:
    name: Build bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build bench
        run: cargo build -p kungfu-cli --bin kungfu_bench --release
      - name: Build demo with max perf
        run: cargo build -p kungfu-cli --features "kungfu-core/io_uring kungfu-core/simd" --release

  js-binding:
    name: JS binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install + build JS binding
        run: cd bindings/js && npm install && npx napi build --platform
        continue-on-error: true

  doc:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build docs
        run: cargo doc --workspace --no-deps
