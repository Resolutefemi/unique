name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run kungfu_bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install oha
        run: cargo install oha --locked --quiet || true
      - name: Build kungfu demo
        run: cargo build -p kungfu-cli --bin kungfu --release --features "kungfu-core/io_uring kungfu-core/simd"
      - name: Start server
        run: |
          ./target/release/kungfu demo &
          sleep 5
          curl -sf http://localhost:3000/hello | grep -q '"message":"world"' || exit 1
      - name: Benchmark
        run: |
          if command -v oha >/dev/null 2>&1; then
            oha -z 30s -c 256 --no-tui http://localhost:3000/hello > /tmp/bench.txt 2>&1
          else
            echo "oha not found, skipping"
          fi
          cat /tmp/bench.txt || true
      - name: Stop server
        if: always()
        run: pkill -f kungfu || true
